# Nixpacks build config for Railway.
# Builds the React frontend, then runs the FastAPI backend which serves
# both the API and the built frontend (frontend/dist) from one origin.

[phases.setup]
# Pure-Python deploy (no numpy/onnxruntime), so no C++ runtime libs needed.
nixPkgs = ["python311", "nodejs_20"]

[phases.install]
cmds = [
  "python -m venv /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r backend/requirements.txt",
  "cd frontend && npm ci",
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
]

[start]
cmd = ". /opt/venv/bin/activate && cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT"
